    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Identidad Electoral | Oblivion Inc.</title>
    
    <!-- Modern Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Roboto+Slab:wght@300;400;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="./css/index.css">
    <link rel="stylesheet" href="./lib/leaflet.css">
    <link rel="stylesheet" href="./css/identidad-electoral/index.css">
    
    <link rel="shortcut icon" href="./img/favicon.ico" type="image/x-icon">
    <link rel="icon" href="./img/favicon.ico" type="image/x-icon">
    
    <script type="text/javascript" src="./js/index.js"></script>
    <script type="text/javascript" src="./lib/leaflet.js"></script>
    <script type="text/javascript" src="./js/identidad-electoral/index.js"></script>
  </head>
  <body>
    <header class="toptitle">
      <div class="header-left">
        <a href="./index.html"><img src="./img/defensa-elecciones-2021-alt.png" alt="Logo" /></a>
      </div>
      <h1>Identidad Electoral</h1>
      <div class="header-right">
        <a href="./index.html" class="back-link">Inicio</a>
      </div>
    </header>

    <div class="warning">
      <p><strong>Nota importante:</strong> La cartografía electoral mostrada corresponde al proceso 2021. Los límites pueden variar para 2024.</p>
    </div>

    <main class="page-container">
      <form method="GET" action="" id="form-sec" class="inputs" onsubmit="event.preventDefault(); ubicaSeccion();">
        <label for="la-seccion">Localizador de Secciones Electorales</label>
        <div class="search-group">
          <input name="sec" id="la-seccion" type="text" placeholder="Sección" autocomplete="off" />
          <input type="submit" value="Buscar" class="button">
        </div>
      </form>

      <div id="resultado">
        <div class="renglones">
          <div class="renglon">
            <span class="etiqueta">Distrito Local</span>
            <span id="del" class="distrito">-</span>
          </div>
          <div class="renglon">
            <span class="etiqueta">Distrito Federal</span>
            <span id="def" class="distrito">-</span>
          </div>
          <div class="renglon">
            <span class="etiqueta">Municipio</span>
            <span id="mun" class="distrito">-</span>
          </div>
          <div class="renglon">
            <span class="etiqueta">Tipo</span>
            <span id="tsec" class="distrito">-</span>
          </div>
        </div>
        
        <div id="secmap-container">
          <div id="secmap"></div>
        </div>
      </div>

      <div id="error" class="infobox alert-error">
        <span id="error-msg">No existe esa sección electoral en Sonora.</span>
      </div>
      
      <div id="info" class="infobox alert-info">
        <span id="info-msg"></span>
      </div>
    </main>

    <footer class="footer-simple">
      <p>&copy; 2026 Oblivion Inc. | Inteligencia electoral estatal</p>
    </footer>
  </body>
</html>
